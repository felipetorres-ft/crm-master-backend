version: "3.8"

services:
  # 芒聰聙芒聰聙 Evolution API 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  evolution:
    image: atendai/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-crm-qs-evolution-key-2026}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      # Webhook global 芒聠聮 aponta pro nosso backend
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${BACKEND_URL:-http://backend:8000}/api/webhook/evolution
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      # Storage
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=sqlite:///data/evolution.db
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      # Inst脙垄ncia
      - CONFIG_SESSION_PHONE_CLIENT=CRM QS
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evolution_data:/evolution/data
    networks:
      - crm-network

  # 芒聰聙芒聰聙 Backend FastAPI 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
  backend:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-crm-qs-evolution-key-2026}
      - DATABASE_PATH=/data/crm_qs.db
      - SECRET_KEY=${SECRET_KEY:-crm-qs-secret-change-me}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - backend_data:/data
    depends_on:
      - evolution
    networks:
      - crm-network

volumes:
  evolution_data:
  backend_data:

networks:
  crm-network:
    driver: bridge
